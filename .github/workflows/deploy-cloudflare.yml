name: deploy-cloudflare

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

  deploy:
    runs-on: ubuntu-latest
    needs: verify
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      CORE_ENGINE_URL: ${{ secrets.CORE_ENGINE_URL }}
      CORE_ENGINE_API_TOKEN: ${{ secrets.CORE_ENGINE_API_TOKEN }}
      NEXT_PUBLIC_TOSS_DONATION_URL: ${{ secrets.NEXT_PUBLIC_TOSS_DONATION_URL }}
      NEXT_PUBLIC_PAYPAL_DONATION_URL: ${{ secrets.NEXT_PUBLIC_PAYPAL_DONATION_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: OpenNext build
        run: npx @opennextjs/cloudflare@1.16.5 build

      - name: Deploy to Cloudflare Workers
        run: npx @opennextjs/cloudflare@1.16.5 deploy

name: frontend-ci

on:
  pull_request:
  push:
    branches-ignore:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      IIS_DEMO_PREVIEW: "1"
      NEXT_PUBLIC_SITE_URL: "http://127.0.0.1:3000"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E smoke tests
        run: npm run test:e2e

      - name: Clean Next cache before build
        run: npm run clean:next

      - name: Build
        run: npm run build
